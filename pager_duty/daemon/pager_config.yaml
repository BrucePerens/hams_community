checks:
  - name: "Disk Space Root"
    type: system
    target: disk
    critical: 90
    interval: 60
  - name: "System Memory"
    type: system
    target: memory
    critical: 90
    interval: 60
  - name: "DNS Chain Resolution"
    type: dns
    target: ENV:DOMAIN
    interval: 60
  - name: "External HTTP Ping"
    type: http
    target: https://ENV:DOMAIN/api/v1/pager/ping
    expect: '{"status": "ok"}'
    interval: 60
  - name: "WSGI HTTP Ping"
    type: http
    target: http://127.0.0.1:8069/api/v1/pager/ping
    expect: '{"status": "ok"}'
    interval: 60
    grace: 120
  - name: "ASGI HTTP Ping"
    type: http
    target: http://127.0.0.1:8072/api/v1/pager/ping
    expect: '{"status": "ok"}'
    interval: 60
    grace: 120
  - name: "Redis Ping"
    type: redis
    target: 127.0.0.1
    port: 6379
    interval: 60
  - name: "RabbitMQ AMQP"
    type: rabbitmq
    target: 127.0.0.1
    port: 5672
    interval: 60
  - name: "PostgreSQL"
    type: postgres
    target: 127.0.0.1
    port: 5432
    dbname: ENV:DB_NAME
    user: odoo
    password: ENV:POSTGRES_PASSWORD
    interval: 60
  - name: "Syslog Fatal"
    type: log
    target: /var/log/syslog
    regex: "FATAL|Exception|Auth failure"
    interval: 1
  - name: "Certbot Readiness"
    type: certbot
    target: ENV:DOMAIN
    interval: 86400
  - name: "Database Backup Pre-Flight"
    type: pg_dump
    target: 127.0.0.1
    port: 5432
    dbname: ENV:DB_NAME
    user: odoo
    password: ENV:POSTGRES_PASSWORD
    interval: 86400
  - name: "Nginx Config Readiness"
    type: nginx
    interval: 3600
  - name: "Logrotate Readiness"
    type: logrotate
    interval: 86400
  - name: "Outbound SMTP Dry-Run"
    type: smtp_dryrun
    target: ENV:SMTP_HOST
    port: ENV:SMTP_PORT
    user: ENV:SMTP_USER
    password: ENV:SMTP_PASS
    interval: 3600
